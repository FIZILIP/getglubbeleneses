{% extends "base.html" %}

{% block content %}
<div class="table-container">
    <div class="table-header">
        <div class="chart-title">
            <i class="fas fa-edit me-2" style="color: #FFD700;"></i>Editar Membro
        </div>
    </div>
    <div class="p-4">
        <form method="POST" enctype="multipart/form-data">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label text-white">Nome</label>
                    <input type="text" name="nome" class="form-control" value="{{ membro.nome }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label text-white">Cargo</label>
                    <select name="cargo" class="form-select" required>
                        <option {% if membro.cargo == 'Treinador Principal' %}selected{% endif %}>Treinador Principal</option>
                        <option {% if membro.cargo == 'Auxiliar Técnico' %}selected{% endif %}>Auxiliar Técnico</option>
                        <option {% if membro.cargo == 'Preparador Físico' %}selected{% endif %}>Preparador Físico</option>
                        <option {% if membro.cargo == 'Treinador de Goleiros' %}selected{% endif %}>Treinador de Goleiros</option>
                        <option {% if membro.cargo == 'Fisioterapeuta' %}selected{% endif %}>Fisioterapeuta</option>
                        <option {% if membro.cargo == 'Médico' %}selected{% endif %}>Médico</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label text-white">Especialidade</label>
                    <input type="text" name="especialidade" class="form-control" value="{{ membro.especialidade or '' }}">
                </div>
                <div class="col-md-3">
                    <label class="form-label text-white">Telefone</label>
                    <input type="text" name="telefone" class="form-control" value="{{ membro.telefone or '' }}">
                </div>
                <div class="col-md-3">
                    <label class="form-label text-white">Email</label>
                    <input type="email" name="email" class="form-control" value="{{ membro.email or '' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label text-white">Data Contratação</label>
                    <input type="date" name="data_contratacao" class="form-control" value="{{ membro.data_contratacao.strftime('%Y-%m-%d') if membro.data_contratacao else '' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label text-white">Foto</label>
                    <input type="file" name="foto" accept="image/*" class="form-control">
                    {% if membro.foto %}
                    <img src="{{ url_for('serve_foto_comissao', filename=membro.foto) }}" style="width:80px;border-radius:10px;margin-top:10px;">
                    {% endif %}
                </div>
            </div>
            <div class="mt-4">
                <button type="submit" class="btn-add-membro"><i class="fas fa-save"></i> Salvar</button>
                <a href="{{ url_for('comissao') }}" class="btn btn-outline-premium ms-2">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
