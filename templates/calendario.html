{% extends "base.html" %}

{% block content %}
<style>
    /* Estilos específicos para o FullCalendar */
    .fc {
        background: linear-gradient(145deg, #111827, #0F1117);
        border-radius: 20px;
        padding: 20px;
        border: 1px solid rgba(255,255,255,0.06);
    }
    
    .fc .fc-toolbar-title {
        color: #FFFFFF;
        font-weight: 700;
    }
    
    .fc .fc-button-primary {
        background: linear-gradient(135deg, #0033A0, #001a4d);
        border: none;
        border-radius: 12px;
        padding: 8px 16px;
        font-weight: 600;
        transition: all 0.2s;
    }
    
    .fc .fc-button-primary:hover {
        background: linear-gradient(135deg, #0033A0, #FFD700);
        transform: translateY(-2px);
    }
    
    .fc .fc-button-primary:disabled {
        background: #6B7280;
        opacity: 0.5;
    }
    
    .fc .fc-button-primary:not(:disabled).fc-button-active {
        background: linear-gradient(135deg, #FFD700, #0033A0);
    }
    
    .fc .fc-daygrid-day-number {
        color: #D1D5DB;
        text-decoration: none;
    }
    
    .fc .fc-col-header-cell-cushion {
        color: #FFD700;
        font-weight: 600;
        text-decoration: none;
    }
    
    .fc .fc-daygrid-day.fc-day-today {
        background: rgba(255, 215, 0, 0.05);
    }
    
    .fc .fc-daygrid-day.fc-day-today .fc-daygrid-day-number {
        background: #FFD700;
        color: #0033A0;
        border-radius: 50%;
        width: 28px;
        height: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
    }
    
    .fc-event {
        cursor: pointer;
        border-radius: 8px;
        padding: 2px 4px;
        font-size: 12px;
        transition: transform 0.2s;
    }
    
    .fc-event:hover {
        transform: scale(1.02);
        filter: brightness(1.1);
    }
    
    .fc .fc-daygrid-event-dot {
        display: none;
    }
    
    .fc .fc-daygrid-day-frame {
        min-height: 100px;
    }
    
    .modal-evento-detalhe .modal-content {
        background: linear-gradient(135deg, #111827, #0F1117);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 20px;
    }
    
    .evento-badge {
        display: inline-block;
        padding: 4px 12px;
        border-radius: 12px;
        font-size: 12px;
        font-weight: 600;
    }
    
    .badge-jogo { background: rgba(239,68,68,0.2); color: #EF4444; }
    .badge-treino { background: rgba(16,185,129,0.2); color: #10B981; }
    .badge-reuniao { background: rgba(245,158,11,0.2); color: #F59E0B; }
    .badge-social { background: rgba(139,92,246,0.2); color: #8B5CF6; }
</style>

<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h2 class="text-white fw-bold mb-1">
            <i class="fas fa-calendar-alt me-2" style="color: #FFD700;"></i>Calendário
        </h2>
        <p class="text-muted mb-0" style="font-size: 14px;">Eventos e reuniões do clube</p>
    </div>
    <button class="btn-primary-premium" data-bs-toggle="modal" data-bs-target="#modalEvento">
        <i class="fas fa-plus"></i> Adicionar Evento
    </button>
</div>

<!-- CALENDÁRIO -->
<div id="calendar"></div>

<!-- MODAL: Adicionar Evento -->
<div class="modal fade modal-premium" id="modalEvento" tabindex="-1" data-bs-backdrop="static">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header" style="background: linear-gradient(135deg, #0033A0, #001a4d); border-bottom: none; border-radius: 20px 20px 0 0; padding: 20px 24px;">
                <h5 class="modal-title text-white">
                    <i class="fas fa-plus-circle me-2" style="color: #FFD700;"></i>Novo Evento
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <form method="POST" action="{{ url_for('adicionar_evento') }}">
                <div class="modal-body p-4">
                    <div class="mb-3">
                        <label class="form-label">Título <span class="text-danger">*</span></label>
                        <input type="text" name="titulo" class="form-control" required placeholder="Ex: Jogo contra Benfica">
                    </div>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Data <span class="text-danger">*</span></label>
                            <input type="date" name="data" class="form-control" required id="evento_data">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Tipo <span class="text-danger">*</span></label>
                            <select name="tipo" class="form-select" required>
                                <option value="Jogo">⚽ Jogo</option>
                                <option value="Treino">🏃 Treino</option>
                                <option value="Reunião">📋 Reunião</option>
                                <option value="Evento Social">🎉 Evento Social</option>
                            </select>
                        </div>
                    </div>
                    <div class="mb-3 mt-3">
                        <label class="form-label">Descrição</label>
                        <textarea name="descricao" class="form-control" rows="3" placeholder="Detalhes do evento..."></textarea>
                    </div>
                </div>
                <div class="modal-footer border-0 px-4 pb-4">
                    <button type="button" class="btn btn-outline-premium" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn-primary-premium">
                        <i class="fas fa-save"></i> Salvar Evento
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- MODAL: Ver Detalhes do Evento -->
<div class="modal fade modal-evento-detalhe" id="modalDetalheEvento" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header" style="background: linear-gradient(135deg, #0033A0, #001a4d); border-bottom: none; border-radius: 20px 20px 0 0; padding: 20px 24px;">
                <h5 class="modal-title text-white">
                    <i class="fas fa-info-circle me-2" style="color: #FFD700;"></i>Detalhes do Evento
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4" id="detalhesEventoBody">
                <!-- Conteúdo preenchido via JavaScript -->
            </div>
            <div class="modal-footer border-0 px-4 pb-4">
                <button type="button" class="btn btn-outline-premium" data-bs-dismiss="modal">Fechar</button>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block scripts %}
<!-- FullCalendar CSS e JS -->
<link href='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css' rel='stylesheet' />
<script src='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js'></script>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        var calendarEl = document.getElementById('calendar');
        
        var calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            locale: 'pt',
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: 'dayGridMonth,timeGridWeek,listMonth'
            },
            buttonText: {
                today: 'Hoje',
                month: 'Mês',
                week: 'Semana',
                list: 'Lista'
            },
            events: {{ eventos_json | safe }},
            eventClick: function(info) {
                // Mostrar detalhes do evento ao clicar
                var evento = info.event;
                var body = document.getElementById('detalhesEventoBody');
                
                var tipoClasse = '';
                if (evento.extendedProps.type === 'Jogo') tipoClasse = 'badge-jogo';
                else if (evento.extendedProps.type === 'Treino') tipoClasse = 'badge-treino';
                else if (evento.extendedProps.type === 'Reunião') tipoClasse = 'badge-reuniao';
                else tipoClasse = 'badge-social';
                
                var html = `
                    <div class="text-center mb-4">
                        <span class="evento-badge ${tipoClasse}">${evento.extendedProps.type || 'Evento'}</span>
                    </div>
                    <div class="mb-3">
                        <strong class="text-white">📅 Data:</strong>
                        <p class="text-muted mt-1">${evento.start.toLocaleDateString('pt-PT')}</p>
                    </div>
                `;
                
                if (evento.extendedProps.hora) {
                    html += `
                        <div class="mb-3">
                            <strong class="text-white">⏰ Hora:</strong>
                            <p class="text-muted mt-1">${evento.extendedProps.hora}</p>
                        </div>
                    `;
                }
                
                if (evento.extendedProps.local) {
                    html += `
                        <div class="mb-3">
                            <strong class="text-white">📍 Local:</strong>
                            <p class="text-muted mt-1">${evento.extendedProps.local}</p>
                        </div>
                    `;
                }
                
                html += `
                    <div class="mb-3">
                        <strong class="text-white">📝 Descrição:</strong>
                        <p class="text-muted mt-1">${evento.extendedProps.description || 'Sem descrição'}</p>
                    </div>
                `;
                
                if (evento.extendedProps.status) {
                    var statusText = evento.extendedProps.status === 'agendada' ? '🟡 Agendada' : '🟢 Concluída';
                    html += `
                        <div class="mb-3">
                            <strong class="text-white">📌 Status:</strong>
                            <p class="text-muted mt-1">${statusText}</p>
                        </div>
                    `;
                }
                
                body.innerHTML = html;
                var modal = new bootstrap.Modal(document.getElementById('modalDetalheEvento'));
                modal.show();
            },
            dateClick: function(info) {
                // Ao clicar em um dia, abre o modal com a data pré-preenchida
                document.getElementById('evento_data').value = info.dateStr;
                var modal = new bootstrap.Modal(document.getElementById('modalEvento'));
                modal.show();
            },
            eventDidMount: function(info) {
                // Tooltip com título ao passar o mouse
                info.el.setAttribute('title', info.event.title);
            }
        });
        
        calendar.render();
    });
</script>
{% endblock %}
