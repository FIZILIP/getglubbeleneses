services:
  - type: web
    name: getclub
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: SECRET_KEY
        generateValue: true
      - key: GETCLUB_DATA_DIR
        value: /var/data
      - key: GETCLUB_LICENSE_FILE
        value: /var/data/.getclub_license.json
      - key: DATABASE_URL
        fromDatabase:
          name: getclub-db
          property: connectionString
    disk:
      name: getclub-data
      mountPath: /var/data
      sizeGB: 1

databases:
  - name: getclub-db
    plan: basic-256mb
